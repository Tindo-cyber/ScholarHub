spring:
  application:
    name: innovatex-api
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  error:
    include-message: always

scholarhub:
  jwt:
    secret: ${JWT_SECRET:scholarhub-dev-secret-key-minimum-256-bits-long-for-hs256}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://www.scholarzim.com,https://scholarzim.com}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:scholarhub}
    secret-key: ${MINIO_SECRET_KEY:scholarhub_dev}
    bucket: scholarhub-files
  ai:
    provider: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
      base-url: https://api.openai.com/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.scholarhub: INFO
    org.springframework.security: WARN
